[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cimgraph-demo"
version = "0.1.0"
description = "CIMantic Graphs demo notebooks and utilities"
requires-python = ">=3.10,<3.15"
dependencies = [
    "cim-graph>=0.4.3a10",
    "ipykernel>=6.0",
    "notebook>=7.0",
]

[dependency-groups]
dev = [
    "jupyter>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["cimgraph_demo"]
